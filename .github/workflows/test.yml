name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies (without bittensor — heavy native build)
        run: |
          python -m pip install --upgrade pip
          # bittensor SDK pulls a Rust toolchain + heavy native deps
          # that drive CI install times to 5+ minutes and break on
          # cleanly-provisioned runners. The test suite uses mock data
          # everywhere; the SDK's live paths are exercised via stubbed
          # modules (test_chain_readonly_sdk_v10.py) or skipped via
          # ``pytest.importorskip("bittensor", ...)``. The lazy import
          # in src/collectors/chain_readonly.py handles the missing-
          # dep case at runtime.
          grep -v '^bittensor' requirements.txt > /tmp/req-no-bittensor.txt
          pip install -r /tmp/req-no-bittensor.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: ruff check
        run: ruff check tao_swarm tests scripts

      # ruff format --check is intentionally not enabled yet. The
      # initial pass would rewrite 60+ files cosmetically, drowning
      # real diffs. A dedicated format-sweep PR will flip this on.
